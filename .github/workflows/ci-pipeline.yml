name: Distributed Ledger CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  integration-test:
    runs-on: ubuntu-latest

    services:
      # 1. Spin up an active PostgreSQL instance inside GitHub's container cloud
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ledger
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ledger"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # 2. Spin up Apache Kafka broker node (KRaft Mode)
      kafka:
        image: apache/kafka:3.7.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: 'broker,controller'
          KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
          KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
          KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092'
          KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'

      # 3. Spin up ClickHouse server node
      clickhouse:
        image: clickhouse/clickhouse-server:24.3-alpine
        ports:
          - 8123:8123
        env:
          CLICKHOUSE_DB: default
          CLICKHOUSE_USER: default
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1

    steps:
    - name: Check out application code repository
      uses: actions/checkout@v4

    - name: Set up Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Application Dependency Packages
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx

    - name: Baseline Target Storage Engine Schemas
      run: |
        # Initialize PostgreSQL structures and inject the mock account
        python schema_init.py
        
        # Initialize ClickHouse Columnar Schemas using HTTP client protocols
        docker exec ${{ job.services.clickhouse.id }} clickhouse-client --query "
        CREATE TABLE IF NOT EXISTS analytical_ledger_events (
            transaction_id UUID, account_id UUID, type Enum8('DEBIT' = 1, 'CREDIT' = 2),
            amount Decimal(15, 4), new_balance Decimal(15, 4), idempotency_key String,
            created_at DateTime DEFAULT now()
        ) ENGINE = MergeTree() PARTITION BY toYYYYMM(created_at) ORDER BY (account_id, created_at);"

    - name: Launch Live FastAPI and Daemon Pipeline Processes
      run: |
        # Run Web Server asynchronously in background background and stream log tracking blocks
        uvicorn main:app --port 8000 > fastapi.log 2>&1 &
        python outbox_worker.py > outbox.log 2>&1 &
        python consumer.py > consumer.log 2>&1 &
        
        # Give services 5 seconds to clear network sockets and connections
        sleep 5

    - name: Execute Automated Integration Test Suite
      run: |
        pytest test_integration.py -v

    - name: Archive Internal Output Application Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: system-runtime-failure-logs
        path: |
          *.log
